# ─── Selenium + Cucumber + TestNG CI ──────────────────────────────────────────
#
# Runs every time code is pushed to main or a pull request targets main.
# Chrome is pre-installed on ubuntu-latest; WebDriverManager downloads the
# matching ChromeDriver binary at runtime so no manual pinning is needed.
#
name: Selenium Tests

on:
  push:
    branches: [main]
    paths:
      # Only trigger when something inside the Java project changes
      - 'selenium-cucumber-testng/**'
      - '.github/workflows/selenium-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'selenium-cucumber-testng/**'
      - '.github/workflows/selenium-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 1 ── Fetch the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 ── Set up Java 17 (LTS) with Maven dependency caching
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3 ── Confirm Chrome is available (ubuntu-latest ships with it)
      - name: Show Chrome version
        run: google-chrome --version

      # 4 ── Run the Cucumber scenarios via Maven Surefire
      #      -Dheadless=true is forwarded as a Java system property so
      #      ChromeOptions picks it up in SSALandingSteps.setUp().
      - name: Run Selenium tests
        working-directory: selenium-cucumber-testng
        run: mvn test -Dheadless=true --no-transfer-progress

      # 5 ── Always upload the HTML/JSON reports so failures are inspectable
      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: selenium-cucumber-testng/target/cucumber-reports/
          retention-days: 30
